<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Client Assessment | Built Beyond</title><link rel="icon" href="favicon.svg"><link rel="stylesheet" href="styles.css"></head><body><header class="site-header"><div class="shell nav-wrap"><a class="brand" href="index.html"><svg class="brand-mark" viewBox="0 0 60 60"><path d="M9 46 25 14h9L18 46H9Z"/><path d="M28 46 44 14h9L37 46h-9Z"/><path d="M18 38h23l-4 8H14l4-8Z"/></svg><span><strong>BUILT BEYOND</strong><small>Health that fits real life.</small></span></a></div></header><main class="section"><div class="shell" style="max-width:820px"><div class="section-heading"><p class="kicker">Client assessment</p><h2>Help me understand your goals and routine.</h2><p>This form creates the foundation for your personalized plan.</p></div><form name="client-assessment" method="POST" data-netlify="true" action="/thank-you.html" class="health-form" style="background:#fff;border:1px solid var(--line);border-radius:28px;color:var(--ink)"><input type="hidden" name="form-name" value="client-assessment"><label><span style="color:var(--ink)">Full name</span><input name="name" required style="background:#f7f8f4;color:var(--ink)"></label><label><span style="color:var(--ink)">Email</span><input type="email" name="email" required style="background:#f7f8f4;color:var(--ink)"></label><label><span style="color:var(--ink)">Phone</span><input name="phone" required style="background:#f7f8f4;color:var(--ink)"></label><label><span style="color:var(--ink)">Age</span><input type="number" name="age" style="background:#f7f8f4;color:var(--ink)"></label><label><span style="color:var(--ink)">Height</span><input name="height" style="background:#f7f8f4;color:var(--ink)"></label><label><span style="color:var(--ink)">Weight</span><input name="weight" style="background:#f7f8f4;color:var(--ink)"></label><label class="wide"><span style="color:var(--ink)">Primary goal</span><select name="goal" style="background:#f7f8f4;color:var(--ink)"><option>Fat loss</option><option>Muscle gain</option><option>Body recomposition</option><option>General health</option></select></label><label class="wide"><span style="color:var(--ink)">Work schedule and lifestyle</span><textarea name="schedule" rows="5" style="padding:14px;border-radius:13px;border:1px solid #dfe4db;background:#f7f8f4;font:inherit"></textarea></label><label class="wide"><span style="color:var(--ink)">Current training and diet</span><textarea name="current-routine" rows="5" style="padding:14px;border-radius:13px;border:1px solid #dfe4db;background:#f7f8f4;font:inherit"></textarea></label><label class="wide"><span style="color:var(--ink)">Medical conditions, injuries or allergies</span><textarea name="medical" rows="4" style="padding:14px;border-radius:13px;border:1px solid #dfe4db;background:#f7f8f4;font:inherit"></textarea></label><button class="btn primary wide" type="submit">Submit assessment</button></form></div></main></body></html>
