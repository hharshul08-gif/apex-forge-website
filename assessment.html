<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Client Assessment | Built Beyond</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
<style>
  .assessment-container {
    max-width: 680px;
    margin: 3rem auto;
    padding: 2.5rem;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .form-group {
    margin-bottom: 1.5rem;
  }
  .form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 0.8rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-family: inherit;
  }
</style>
</head>
<body>
<header class="site-header">
<div class="shell nav-wrap">
<a aria-label="Built Beyond home" class="brand" href="index.html#top">
<span><strong>BUILT BEYOND</strong><small>Performance Coaching</small></span>
</a>
</div>
</header>

<main class="shell">
  <div class="assessment-container">
    <div id="assessmentFormBlock">
      <p class="kicker">Step 1 of 2</p>
      <h2>Client Assessment Form</h2>
      <p style="margin-bottom: 2rem; opacity: 0.85;">Please fill out your details prior to selecting and finalizing your coaching package.</p>
      
      <!-- Native Netlify Redirect to /payment.html -->
      <form id="assessmentForm" name="client-assessment" method="POST" action="/payment.html" data-netlify="true">
        <input type="hidden" name="form-name" value="client-assessment" />
        
        <div class="form-group">
          <label for="fullName">Full Name *</label>
          <input type="text" id="fullName" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="phone">Phone / WhatsApp Number *</label>
          <input type="tel" id="phone" name="phone" required placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label for="selectedPlan">Select Plan *</label>
          <select id="selectedPlan" name="plan" required>
            <option value="foundation">Foundation (12 Weeks) — ₹4,800</option>
            <option value="momentum">Momentum (24 Weeks) — ₹8,000</option>
            <option value="transformation">Transformation (52 Weeks) — ₹13,600</option>
          </select>
        </div>
        <div class="form-group">
          <label for="goals">Primary Health & Fitness Goals</label>
          <textarea id="goals" name="goals" rows="4" placeholder="Share your primary targets, busy schedule considerations, etc."></textarea>
        </div>
        <button type="submit" id="submitBtn" class="btn primary full">Submit Assessment & Proceed to Payment →</button>
      </form>
    </div>
  </div>
</main>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const planParam = urlParams.get('plan');
  if (planParam && document.getElementById('selectedPlan')) {
    document.getElementById('selectedPlan').value = planParam;
  }

  document.getElementById('assessmentForm').addEventListener('submit', function() {
    const chosenPlan = document.getElementById('selectedPlan').value;
    const currentDate = new Date().toLocaleDateString('en-US', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    localStorage.setItem('bb_enrollment_date', currentDate);
    localStorage.setItem('bb_enrollment_plan', chosenPlan);
  });
</script>
</body>
</html>
