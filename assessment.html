<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Assessment - Built Beyond</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #38bdf8; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0369a1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Built Beyond Intake Assessment</h2>
    
    <!-- JavaScript handles redirect to prevent any HTTP 405 Method errors -->
    <form id="assessmentForm" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="plan">Select Coaching Program</label>
            <select id="plan" name="plan" required>
                <option value="foundation">Foundation Plan</option>
                <option value="momentum">Momentum Plan</option>
                <option value="transformation">Transformation Plan</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fitness_goal">Primary Fitness Goal</label>
            <textarea id="fitness_goal" name="fitness_goal" rows="3" placeholder="Tell us about your primary fitness targets..."></textarea>
        </div>

        <button type="submit">Proceed to Payment</button>
    </form>
</div>

<script>
    // Handle form submit via JS redirect
    function handleFormSubmit(event) {
        event.preventDefault(); // Stop standard HTTP submission
        
        const plan = document.getElementById('plan').value;
        const name = encodeURIComponent(document.getElementById('name').value);
        const email = encodeURIComponent(document.getElementById('email').value);
        
        // Redirect cleanly to payment page with query params
        window.location.href = `payment.html?plan=${plan}&name=${name}&email=${email}`;
    }

    // Auto-select plan from URL if present (e.g., assessment.html?plan=momentum)
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const planParam = urlParams.get('plan');
        if (planParam) {
            const planSelect = document.getElementById('plan');
            if (planSelect) planSelect.value = planParam.toLowerCase();
        }
    });
</script>

</body>
</html>
