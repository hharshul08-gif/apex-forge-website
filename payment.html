<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment - Built Beyond</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #38bdf8; }
        .plan-title {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
            margin: 15px 0;
            text-transform: capitalize;
        }
        .razorpay-container {
            margin-top: 30px;
            min-height: 60px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Complete Your Enrollment</h2>
    <p>Selected Plan:</p>
    <div id="selected-plan-display" class="plan-title">Loading...</div>

    <div class="razorpay-container" id="razorpay-button-wrapper">
        <!-- Razorpay button script injects here -->
    </div>
</div>

<script>
    // Plan button mapping
    const planButtons = {
        'foundation': 'pl_TGunCpCS76IPFx',
        'momentum': 'pl_TGuqq1QOc3WZOV',
        'transformation': 'pl_TGusnNWMw4EpHL'
    };

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        let selectedPlan = urlParams.get('plan');

        // Fallback default plan
        if (!selectedPlan || !planButtons[selectedPlan.toLowerCase()]) {
            selectedPlan = 'foundation';
        } else {
            selectedPlan = selectedPlan.toLowerCase();
        }

        // Display selection
        document.getElementById('selected-plan-display').innerText = selectedPlan + " Plan";

        // Inject Razorpay button
        const buttonId = planButtons[selectedPlan];
        const wrapper = document.getElementById('razorpay-button-wrapper');

        const form = document.createElement('form');
        const script = document.createElement('script');
        script.src = 'https://checkout.razorpay.com/v1/payment-button.js';
        script.setAttribute('data-payment_button_id', buttonId);
        script.async = true;

        form.appendChild(script);
        wrapper.appendChild(form);
    });
</script>

</body>
</html>
